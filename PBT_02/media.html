<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu sản phẩm</title>
</head>
<body>

<h1>Giới thiệu sản phẩm iPhone 16</h1>

<section>

    <figure>
        <img src="https://placehold.co/300x200" alt="iPhone 16 màu đen, mặt lưng kính, camera kép" loading="lazy"style="max-width: 100%; height: auto;">
        <figcaption>iPhone 16 màu đen - thiết kế hiện đại</figcaption>
    </figure>

    <figure>
        <img src="https://placehold.co/300x200" alt="iPhone 16 mặt trước với màn hình sáng và viền mỏng" loading="lazy" style="max-width: 100%; height: auto;">
        <figcaption>Màn hình sắc nét, viền siêu mỏng</figcaption>
    </figure>

    <figure>
        <img src="https://placehold.co/300x200" alt="Cụm camera iPhone 16 chụp cận cảnh" loading="lazy" style="max-width: 100%; height: auto;">
        <figcaption>Camera chất lượng cao</figcaption>
    </figure>

</section>

<section>
    <h2>Video giới thiệu (YouTube)</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/70gCxCTpvBg" title="iPhone 16 Pro Reveal (4k)" frameborder="0" allowfullscreen>
    </iframe>
</section>

<section>
    <video controls poster="https://placehold.co/300x200" style="max-width: 100%;">
        <source src="video.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
        Trình duyệt của bạn không hỗ trợ thẻ video này.
    </video>
</section>

<section>
    <h2>Nhạc nền giới thiệu</h2>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>
</section>

<hr>

<section>
    <h2>Logo</h2>
    <svg width="120" height="120">
        <circle cx="60" cy="60" r="50" fill="blue" />
        <text x="60" y="65" text-anchor="middle" fill="white" font-size="14">
        </text>
    </svg>
</section>

</body>
</html>
