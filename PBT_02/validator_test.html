<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Validation</title>
</head>
<body>

<form action="#" method="post">
    <!-- Trường hợp 1 -->
    <label>Text (required):</label><br>
    <input type="text" required value=""><br><br>
    <!-- Trường hợp 2 -->
    <label>Email:</label><br>
    <input type="email" value="abc"><br><br>
    <!-- Trường hợp 3 -->
    <label>Number (1 → 10):</label><br>
    <input type="number" min="1" max="10" value="15"><br><br>
    <!-- Trường hợp 4 -->
    <label>Nhập 10 số:</label><br>
    <input type="text" pattern="[0-9]{10}" value="abc123"><br><br>
    <!-- Trường hợp 5 -->
    <label>Password (min 8 ký tự):</label><br>
    <input type="password" minlength="8" value="12"><br><br>
    <button type="submit">Submit</button>
</form>

</body>
</html>
