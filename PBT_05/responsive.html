<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <div class="logo">SHOP</div>

        <div class="hamburger">
            ☰
        </div>

        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <aside class="sidebar">
        <h3>Filters</h3>

        <label><input type="checkbox"> Laptop</label>
        <label><input type="checkbox"> Phone</label>
        <label><input type="checkbox"> Tablet</label>
        <label><input type="checkbox"> Accessories</label>
    </aside>

    <!-- Desktop Ads -->
    <aside class="ads">
        <img src="https://placehold.co/180x600" alt="Advertisement">
    </aside>

    <!-- Products -->
    <main class="products">

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Product 1</h3>
            <p>$100</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Product 2</h3>
            <p>$120</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Product 3</h3>
            <p>$140</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Product 4</h3>
            <p>$160</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Product 5</h3>
            <p>$180</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Product 6</h3>
            <p>$200</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Product 7</h3>
            <p>$220</p>
        </div>

        <div class="card">
            <img src="https://placehold.co/300x200" alt="">
            <h3>Product 8</h3>
            <p>$240</p>
        </div>
    </main>

    <footer class="footer">
        © 2026 Responsive Shop
    </footer>
</body>

</html>
