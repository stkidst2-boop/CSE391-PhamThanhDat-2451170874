<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid E-Commerce</title>
    <link rel="stylesheet" href="grid.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>E-Commerce Store</h1>
        </header>

        <section class="hero">
            <h2>Summer Sale 50% OFF</h2>
        </section>

        <aside class="sidebar">
            <h3>Filters</h3>

            <label>
                <input type="checkbox">
                Laptop
            </label>

            <label>
                <input type="checkbox">
                Phone
            </label>

            <label>
                <input type="checkbox">
                Tablet
            </label>

            <label>
                <input type="checkbox">
                Accessories
            </label>
        </aside>

        <main class="main">
            <div class="card featured">
                <img src="https://via.placeholder.com/500x250" alt="">
                <h3>Featured Product</h3>
                <p>$999</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Product 1</h3>
                <p>$120</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Product 2</h3>
                <p>$140</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Product 3</h3>
                <p>$160</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Product 4</h3>
                <p>$180</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Product 5</h3>
                <p>$200</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Product 6</h3>
                <p>$220</p>
            </div>
        </main>

        <aside class="ads">
            <h3>Advertisement</h3>

            <img src="https://via.placeholder.com/180x600" alt="Ads Banner">
        </aside>
        <footer class="footer">
            <p>© 2026 E-Commerce Store</p>
        </footer>
    </div>
</body>

</html>
